<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <meta name="theme-color" content="#0D9488" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Kosh" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- SEO / OG -->
    <meta name="description" content="Check your financial level — 15 questions, 5 minutes. Built for young Bangladeshis." />
    <meta property="og:title" content="Kosh — Your Money Level Check" />
    <meta property="og:description" content="How well do you actually understand money? Find out in 5 minutes." />
    <meta property="og:image" content="/logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,700;12..96,800&display=swap" rel="stylesheet" />

    <title>Kosh — Your Money Level Check</title>
  </head>
  <body>
    <!-- Apply theme + bg color before React mounts so users never see a
         flash of light mode (or pure-white screen between paint and JS). -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("kosh:theme") || "dark";
          var html = document.documentElement;
          html.classList.remove("dark", "light");
          if (t === "dark") html.classList.add("dark");
          else if (t === "light") html.classList.add("light");
          var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
          if (t === "dark" || (t === "system" && prefersDark)) {
            html.style.background = "hsl(235, 50%, 11%)";
          }
        } catch (_) { /* localStorage unavailable; fall through */ }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
